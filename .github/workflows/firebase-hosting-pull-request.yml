name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
  id-token: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build shared package
      - run: pnpm --filter @ejm/shared build

      # Build web
      - name: Build web
        run: pnpm --filter web build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDyYp2GQdH-8h16B6XNx3sdI8tdDcY1tEw
          VITE_FIREBASE_AUTH_DOMAIN: sync-sit.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sync-sit
          VITE_FIREBASE_STORAGE_BUCKET: sync-sit.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '652129443234'
          VITE_FIREBASE_APP_ID: '1:652129443234:web:b1addb8ca9204154aba6fb'
          VITE_FIREBASE_VAPID_KEY: BHhR2VRnGyiMruB55skkISGURA5MqVat0lzGRtzfnfHJ6IlgOs8sZDKy25k0nitxIlmLToaUWr1YfX5KBuxg1yo

      # Authenticate via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: sync-sit
          workload_identity_provider: projects/652129443234/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-action-1196270164@sync-sit.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      # Deploy preview channel
      - name: Deploy Preview
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          npx firebase-tools hosting:channel:deploy "$CHANNEL" --project sync-sit --non-interactive --expires 7d

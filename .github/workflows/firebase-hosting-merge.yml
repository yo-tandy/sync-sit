name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build shared package
      - run: pnpm --filter @ejm/shared build

      # Build web
      - run: pnpm --filter web build

      # Deploy hosting (uses FirebaseExtended action which handles its own auth)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYNC_SIT }}
          channelId: live
          projectId: sync-sit

      # Bundle shared for functions deploy
      - run: node scripts/bundle-shared-for-deploy.js

      # Build functions
      - run: cd apps/functions && npx tsc

      # Deploy functions using service account
      - name: Deploy Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYNC_SIT }}' > /tmp/gcp-sa.json
          npx firebase-tools deploy --only functions --project sync-sit --non-interactive --force
          rm -f /tmp/gcp-sa.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json

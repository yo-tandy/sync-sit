name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build shared package
      - run: pnpm --filter @ejm/shared build

      # Build web
      - run: pnpm --filter web build

      # Authenticate to Google Cloud via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: sync-sit
          workload_identity_provider: projects/652129443234/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-action-1196270164@sync-sit.iam.gserviceaccount.com

      # Deploy hosting
      - name: Deploy Hosting
        run: npx firebase-tools deploy --only hosting --project sync-sit --non-interactive

      # Bundle shared for functions deploy
      - run: node scripts/bundle-shared-for-deploy.js

      # Build functions
      - run: cd apps/functions && npx tsc

      # Deploy functions
      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project sync-sit --non-interactive --force

      # Unbundle shared
      - run: node scripts/unbundle-shared-after-deploy.js
